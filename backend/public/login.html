<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kenesis � Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 20% 50%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(41, 121, 255, 0.08) 0%, transparent 50%),
                  #030303;
    }
    .auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;position:relative;}
    .auth-card{
      width:100%;max-width:440px;background:rgba(12, 12, 12, 0.8);border:1px solid rgba(255, 255, 255, 0.08);
      padding:3rem;border-radius:24px;backdrop-filter:blur(24px);box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
    }
    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 230, 118, 0.5), transparent);
    }
    .auth-brand{justify-content:center;margin-bottom:2.5rem;font-size:1.4rem;}
    .auth-head{text-align:center;margin-bottom:2.5rem;}
    .auth-title{font-size:1.75rem;font-weight:700;margin-bottom:0.75rem;font-family: 'Space Grotesk', sans-serif;}
    .auth-sub{color:var(--text-muted);font-size:0.95rem;}
    .auth-foot{text-align:center;margin-top:2rem;font-size:0.9rem;color:var(--text-muted);}
    .auth-foot a{color:var(--green-bright);font-weight:600;transition: color 0.2s;}
    .auth-foot a:hover{color: #fff;}
  </style>
</head>
<body data-page="login">
  <div class="auth-page">
    <div class="auth-card">
      <a href="/index.html" class="brand auth-brand">
        <div class="brand-pill"></div>
        <span>Kenesis</span>
      </a>

      <div class="auth-head">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Enter your credentials to access the dashboard</p>
      </div>

      <div id="loginError" style="display:none;background:rgba(255,23,68,0.1);border:1px solid rgba(255,23,68,0.2);color:#ff5252;padding:0.75rem;border-radius:6px;font-size:0.85rem;margin-bottom:1.5rem;text-align:center"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input id="username" type="text" class="form-input" placeholder="coach_alex" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-input" placeholder="��������" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary btn-block" style="width:100%">Sign In</button>
      </form>

      <div class="auth-foot">
        Don't have an account? <a href="/signup.html">Create one</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/app.js"></script>
</body>
</html>
