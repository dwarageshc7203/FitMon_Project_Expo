<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | FitMon</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            max-width: 1200px;
        }
        @media (max-width: 1024px) { .profile-grid { grid-template-columns: 1fr; } }

        .profile-card-hero {
            background: rgba(12, 12, 12, 0.6);
            border: 1px solid var(--border-dim);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-xl);
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        .profile-card-hero:hover { border-color: var(--green-border); box-shadow: var(--shadow-glow-green); }

        .profile-card-hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 150px;
            background: radial-gradient(circle at center top, rgba(0, 230, 118, 0.15) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        .avatar-container {
            width: 120px; height: 120px; border-radius: 50%;
            background: var(--bg-layer2);
            border: 2px solid var(--green-bright);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem; position: relative; z-index: 1;
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.2);
            font-size: 3rem; font-weight: 700; font-family: "Space Grotesk";
        }

        .profile-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; z-index: 1; }
        .profile-role-badge { 
            background: rgba(0, 230, 118, 0.1); color: var(--green-bright); 
            padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; 
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px; 
            border: 1px solid rgba(0, 230, 118, 0.3); margin-bottom: 0.5rem; z-index: 1; 
        }
        
        .content-card {
            background: rgba(12, 12, 12, 0.6); border: 1px solid var(--border-dim);
            border-radius: var(--radius-xl); padding: 2rem; margin-bottom: 1.5rem;
        }
        .content-header { border-bottom: 1px solid var(--border-dim); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .content-title { font-size: 1.1rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body data-page="profile">
  
  <div class="app-container">
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>FITMON</span>
        </div>
        
        <div class="nav-menu">
            <a href="/home.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="/session.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="10 8 16 12 10 16 10 8"></polygon>
                </svg>
                <span>Live Session</span>
            </a>
            <a href="/workouts.html" class="nav-item" id="navWorkouts">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6.5 6.5h11"></path><path d="M6.5 17.5h11"></path><path d="M6 20v-2a6 6 0 1 1 12 0v2"></path><path d="M6 4v2a6 6 0 1 0 12 0V4"></path></svg>
                <span>Workouts</span>
            </a>
            <a href="/profile.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Profile</span>
            </a>
        </div>

        <div class="user-profile">
             <div class="user-avatar" id="navAvatar">U</div>
             <div class="user-info">
                 <div class="user-name" id="navName">User</div>
                 <div class="user-role" id="navRole">Athlete</div>
             </div>
             <button class="logout-btn" onclick="logout()" title="Sign Out">
                 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
             </button>
        </div>
    </nav>

    <main class="main-content">
      <header class="top-bar">
          <div class="breadcrumbs">
              <span>Account</span>
              <span class="separator">/</span>
              <span class="current">My Profile</span>
          </div>
      </header>

      <div style="padding: 2rem;">
        <div class="profile-grid">
            
            <!-- Left Column: Hero Card -->
            <div class="profile-sidebar">
                <div class="profile-card-hero">
                    <div class="avatar-container" id="profileAvatar">U</div>
                    <div class="profile-name" id="profileName">Loading...</div>
                    <div class="profile-role-badge" id="profileRole">ATHLETE</div>
                    <div style="color: var(--text-muted); font-size: 0.9rem;" id="profileUsername">@username</div>
                    
                    <div style="max-width: 100%; margin-top: 2rem; width: 100%;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-dim); padding-bottom: 0.5rem;">
                            <span class="text-muted" style="font-size: 0.8rem;">JOINED</span>
                            <span style="font-weight: 600; font-size: 0.9rem;">Oct 2023</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-dim); padding-bottom: 0.5rem;">
                            <span class="text-muted" style="font-size: 0.8rem;">STATUS</span>
                            <span style="font-weight: 600; font-size: 0.9rem; color: var(--green-bright);">Active</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Settings / Stats -->
            <div class="profile-content">
                <div class="content-card">
                    <div class="content-header">
                        <div class="content-title">Personal Information</div>
                    </div>
                    <form id="profileForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="input-group">
                            <label style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Full Name</label>
                            <input type="text" class="input-field" value="Demo User" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border-dim); color: #fff; border-radius: 8px;">
                        </div>
                        <div class="input-group">
                            <label style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Email</label>
                            <input type="email" class="input-field" value="user@example.com" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border-dim); color: #fff; border-radius: 8px;">
                        </div>
                        <div style="grid-column: span 2; text-align: right;">
                            <button type="button" class="btn-primary" style="padding: 0.75rem 1.5rem; background: var(--green-bright); color: #000; font-weight: 600; border: none; border-radius: 8px; cursor: pointer;">Save Changes</button>
                        </div>
                    </form>
                </div>

                <div class="content-card">
                     <div class="content-header">
                        <div class="content-title">Session History</div>
                    </div>
                    <div id="sessionHistoryList">
                        <div style="text-align: center; padding: 2rem; color: var(--text-muted);">No history available.</div>
                    </div>
                </div>
            </div>

        </div>
      </div>
    </main>
  </div>
  
  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if(!user) { window.location.href = '/login.html'; return; }

        // Fill Navbar
        document.getElementById('navName').textContent = user.username;
        document.getElementById('navRole').textContent = user.role.toUpperCase();
        document.getElementById('navAvatar').textContent = user.username.charAt(0).toUpperCase();

        // Fill Profile Card
        document.getElementById('profileName').textContent = user.username; // Or real name if available
        document.getElementById('profileUsername').textContent = '@' + user.username;
        document.getElementById('profileAvatar').textContent = user.username.charAt(0).toUpperCase();
        document.getElementById('profileRole').textContent = user.role.toUpperCase();

        // Doctor Logic
        if(user.role === 'doctor') {
            const navWorkouts = document.getElementById('navWorkouts');
            if(navWorkouts) navWorkouts.style.display = 'none';
            
            // Adjust colors for doctor
            document.querySelector('.profile-card-hero').style.borderColor = 'var(--blue-border)';
            document.querySelector('.avatar-container').style.borderColor = 'var(--blue-bright)';
            document.querySelector('.profile-role-badge').style.color = 'var(--blue-bright)';
            document.querySelector('.profile-role-badge').style.borderColor = 'rgba(41, 121, 255, 0.3)';
            document.querySelector('.profile-role-badge').style.background = 'rgba(41, 121, 255, 0.1)';
        }
    });

    function logout() {
      localStorage.removeItem('fitmonCurrentUser');
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
