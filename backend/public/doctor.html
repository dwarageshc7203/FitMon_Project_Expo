<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMP System - Doctor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #4CAF50;
        }

        .status-indicator.disconnected {
            background: #f44336;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #2a5298;
            margin-bottom: 15px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-value {
            font-size: 3em;
            font-weight: bold;
            color: #1e3c72;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .timestamp {
            color: #999;
            font-size: 0.8em;
            margin-top: 10px;
        }

        .alert {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert.error {
            background: #f8d7da;
            border-left-color: #dc3545;
        }

        .alert.success {
            background: #d4edda;
            border-left-color: #28a745;
        }

        .form-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: #2a5298;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2a5298;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
            display: block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 82, 152, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .report-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            display: none;
        }

        .report-section.active {
            display: block;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .report-header h2 {
            color: #2a5298;
            margin: 0;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .status-badge.achieved {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.progress {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.not-achieved {
            background: #f8d7da;
            color: #721c24;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .report-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #2a5298;
        }

        .report-card h3 {
            color: #2a5298;
            margin: 0 0 10px 0;
            font-size: 1em;
        }

        .report-card p {
            margin: 5px 0;
            color: #333;
            line-height: 1.6;
        }

        .report-card ul {
            margin: 10px 0;
            padding-left: 20px;
        }

        .report-card li {
            margin: 8px 0;
            color: #333;
        }

        .plan-type-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 10px;
        }

        .plan-type-badge.strong {
            background: #d1ecf1;
            color: #0c5460;
        }

        .plan-type-badge.lazy {
            background: #f8d7da;
            color: #721c24;
        }

        .plan-type-badge.normal {
            background: #d4edda;
            color: #155724;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #2a5298;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👨‍⚕️ Doctor Dashboard</h1>
        <p>
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="connectionStatus">Connecting...</span>
        </p>
    </div>

    <div id="alerts"></div>

    <div class="dashboard">
        <!-- Rep Count Card -->
        <div class="card">
            <h2>📊 Total Reps</h2>
            <div class="stat-value" id="repCount">0</div>
            <div class="stat-label">Bicep Curls Completed</div>
            <div class="timestamp" id="repTimestamp">No data yet</div>
        </div>

        <!-- Form Accuracy Card -->
        <div class="card">
            <h2>✅ Form Accuracy</h2>
            <div class="stat-value" id="formAccuracy">0%</div>
            <div class="stat-label">Exercise Form Score</div>
            <div class="timestamp" id="formTimestamp">No data yet</div>
        </div>

        <!-- Sensor Data Card -->
        <div class="card">
            <h2>💪 Muscle Activation</h2>
            <div class="stat-value" id="sensorValue">0</div>
            <div class="stat-label">FSR Sensor Reading</div>
            <div class="timestamp" id="sensorTimestamp">No data yet</div>
        </div>
    </div>

    <!-- FSR Sensor Chart -->
    <div class="card" style="margin-top: 20px;">
        <h2>📈 Real-Time FSR Sensor Data</h2>
        <div class="chart-container">
            <canvas id="sensorChart"></canvas>
        </div>
    </div>

    <!-- Session Report Form -->
    <div class="form-section">
        <h2 style="color: #2a5298; margin-bottom: 20px;">📋 Generate Session Report</h2>
        <form id="sessionReportForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" name="height" required min="50" max="250" step="0.1" placeholder="172">
                </div>
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" name="weight" required min="20" max="300" step="0.1" placeholder="72">
                </div>
                <div class="form-group">
                    <label for="bmi">BMI</label>
                    <input type="number" id="bmi" name="bmi" required min="10" max="50" step="0.1" placeholder="24.3">
                </div>
                <div class="form-group">
                    <label for="fitness_experience">Fitness Experience</label>
                    <select id="fitness_experience" name="fitness_experience" required>
                        <option value="">Select level</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="therapy_cause">Therapy Cause</label>
                    <input type="text" id="therapy_cause" name="therapy_cause" required placeholder="Post ACL recovery">
                </div>
                <div class="form-group">
                    <label for="goal">Session Goal</label>
                    <input type="text" id="goal" name="goal" required placeholder="Achieve 80 degree knee flexion">
                </div>
                <div class="form-group">
                    <label for="accuracy_rate">Accuracy Rate (%)</label>
                    <input type="number" id="accuracy_rate" name="accuracy_rate" required min="0" max="100" step="0.1" placeholder="78">
                </div>
                <div class="form-group">
                    <label for="activation_rate">Activation Rate (%)</label>
                    <input type="number" id="activation_rate" name="activation_rate" required min="0" max="100" step="0.1" placeholder="66">
                </div>
            </div>
            <button type="submit" class="btn" id="generateBtn">🤖 Generate AI Report</button>
        </form>
        <div id="loadingIndicator" class="loading" style="display: none;">Generating report</div>
    </div>

    <!-- Report Display -->
    <div class="report-section" id="reportSection">
        <div class="report-header">
            <h2>📊 Session Report</h2>
            <span class="status-badge" id="goalStatusBadge"></span>
        </div>
        <div id="reportContent"></div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        // Configuration - Socket.IO automatically handles protocol (http/ws)
        const API_URL = window.location.origin;

        
        // State
        let socket = null;
        let repCount = 0;
        let formAccuracy = 0;
        let sensorValue = 0;
        let sensorChart = null;
        let sensorData = [];
        let sensorLabels = [];
        const maxDataPoints = 50; // Keep last 50 data points

        // DOM elements
        const statusIndicator = document.getElementById('statusIndicator');
        const connectionStatus = document.getElementById('connectionStatus');
        const repCountEl = document.getElementById('repCount');
        const formAccuracyEl = document.getElementById('formAccuracy');
        const sensorValueEl = document.getElementById('sensorValue');
        const repTimestampEl = document.getElementById('repTimestamp');
        const formTimestampEl = document.getElementById('formTimestamp');
        const sensorTimestampEl = document.getElementById('sensorTimestamp');
        const alertsEl = document.getElementById('alerts');

        /**
         * Initialize Chart.js for FSR sensor data
         */
        function initChart() {
            const ctx = document.getElementById('sensorChart').getContext('2d');
            sensorChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sensorLabels,
                    datasets: [{
                        label: 'FSR Sensor Reading',
                        data: sensorData,
                        borderColor: 'rgb(42, 82, 152)',
                        backgroundColor: 'rgba(42, 82, 152, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Sensor Value'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Time'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                        }
                    },
                    animation: {
                        duration: 0 // Disable animation for real-time updates
                    }
                }
            });
        }

        /**
         * Add sensor data point to chart
         */
        function addSensorDataPoint(value, timestamp) {
            const time = new Date(timestamp).toLocaleTimeString();
            
            sensorData.push(value);
            sensorLabels.push(time);

            // Keep only last maxDataPoints
            if (sensorData.length > maxDataPoints) {
                sensorData.shift();
                sensorLabels.shift();
            }

            sensorChart.update('none'); // 'none' mode for no animation
        }

        /**
         * Update rep count display
         */
        function updateRepCount(count, timestamp) {
            repCount = count;
            repCountEl.textContent = count;
            repTimestampEl.textContent = `Last updated: ${new Date(timestamp).toLocaleTimeString()}`;
        }

        /**
         * Update form accuracy display
         */
        function updateFormAccuracy(accuracy, timestamp) {
            formAccuracy = accuracy;
            formAccuracyEl.textContent = accuracy + '%';
            formTimestampEl.textContent = `Last updated: ${new Date(timestamp).toLocaleTimeString()}`;
            
            // Visual feedback based on accuracy
            if (accuracy >= 80) {
                formAccuracyEl.style.color = '#4CAF50';
            } else if (accuracy >= 60) {
                formAccuracyEl.style.color = '#FF9800';
            } else {
                formAccuracyEl.style.color = '#f44336';
            }
        }

        /**
         * Update sensor value display
         */
        function updateSensorValue(value, timestamp) {
            sensorValue = value; // Store for use in form auto-population
            sensorValueEl.textContent = value.toFixed(2);
            sensorTimestampEl.textContent = `Last updated: ${new Date(timestamp).toLocaleTimeString()}`;
            
            // Update chart
            addSensorDataPoint(value, timestamp);
        }

        /**
         * Show alert message
         */
        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            alertsEl.appendChild(alert);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        /**
         * Connect to WebSocket server
         */
        function connectWebSocket() {
            socket = io(API_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionAttempts: 5,
            });

            socket.on('connect', () => {
                console.log('✅ Connected to WebSocket server');
                statusIndicator.className = 'status-indicator connected';
                connectionStatus.textContent = 'Connected';
                showAlert('Successfully connected to patient monitoring system', 'success');
            });

            socket.on('disconnect', () => {
                console.log('❌ Disconnected from WebSocket server');
                statusIndicator.className = 'status-indicator disconnected';
                connectionStatus.textContent = 'Disconnected';
                showAlert('Connection lost. Attempting to reconnect...', 'error');
            });

            socket.on('connect_error', (error) => {
                console.error('WebSocket connection error:', error);
                statusIndicator.className = 'status-indicator disconnected';
                connectionStatus.textContent = 'Connection Error';
            });

            // Listen for CV updates (reps and form accuracy)
            socket.on('cv-update', (data) => {
                console.log('📥 Received CV update:', data);
                updateRepCount(data.reps, data.timestamp);
                updateFormAccuracy(data.formAccuracy, data.timestamp);
            });

            // Listen for sensor data from ESP32
            socket.on('sensor-data', (data) => {
                console.log('📥 Received sensor data:', data);
                updateSensorValue(data.value, data.timestamp);
            });
        }

        /**
         * Calculate BMI automatically when height/weight change
         */
        function calculateBMI() {
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            
            if (height && weight && height > 0 && weight > 0) {
                const bmi = (weight / ((height / 100) ** 2)).toFixed(1);
                document.getElementById('bmi').value = bmi;
            }
        }

        document.getElementById('height').addEventListener('input', calculateBMI);
        document.getElementById('weight').addEventListener('input', calculateBMI);

        /**
         * Populate form with current IoT/CV data if available
         */
        function populateIoTData() {
            // Use current sensor and CV data if available
            if (formAccuracy > 0) {
                document.getElementById('accuracy_rate').value = formAccuracy.toFixed(1);
            }
            // Convert sensor value (0-4095) to percentage (0-100)
            // Assuming max activation is at sensor value of 4095
            if (sensorValue > 0) {
                const activationPercent = (sensorValue / 4095 * 100).toFixed(1);
                document.getElementById('activation_rate').value = activationPercent;
            }
        }

        /**
         * Generate session report
         */
        async function generateReport(event) {
            event.preventDefault();
            
            const form = document.getElementById('sessionReportForm');
            const formData = new FormData(form);
            
            const data = {
                height: parseFloat(formData.get('height')),
                weight: parseFloat(formData.get('weight')),
                bmi: parseFloat(formData.get('bmi')),
                fitness_experience: formData.get('fitness_experience'),
                therapy_cause: formData.get('therapy_cause'),
                goal: formData.get('goal'),
                accuracy_rate: parseFloat(formData.get('accuracy_rate')),
                activation_rate: parseFloat(formData.get('activation_rate')),
            };

            // Validate
            if (!data.height || !data.weight || !data.bmi || !data.fitness_experience || 
                !data.therapy_cause || !data.goal || 
                isNaN(data.accuracy_rate) || isNaN(data.activation_rate)) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            const generateBtn = document.getElementById('generateBtn');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const reportSection = document.getElementById('reportSection');

            // Show loading
            generateBtn.disabled = true;
            loadingIndicator.style.display = 'block';
            reportSection.classList.remove('active');

            try {
                const response = await fetch(`${API_URL}/session/generate-report`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: 'Unknown error' }));
                    const errorMsg = errorData.error || errorData.message || `Server error: ${response.status}`;
                    console.error('Server error:', errorData);
                    throw new Error(errorMsg);
                }

                const report = await response.json();
                displayReport(report);
                showAlert('Session report generated successfully', 'success');
            } catch (error) {
                console.error('Error generating report:', error);
                const errorMsg = error?.message || 'Unknown error occurred';
                showAlert(`Failed to generate report: ${errorMsg}`, 'error');
            } finally {
                generateBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        }

        /**
         * Display session report
         */

         // Normalize recommendations output from AI

        function displayReport(report) {
    // Normalize AI recommendations to avoid .map crash
    let rec = report?.recommendations;

    if (typeof rec === "string") {
        rec = {
            immediate_actions: [rec],
            short_term_goals: [],
            long_term_goals: [],
            lifestyle_modifications: []
        };
    }

    if (!rec || typeof rec !== "object") {
        rec = {
            immediate_actions: [],
            short_term_goals: [],
            long_term_goals: [],
            lifestyle_modifications: []
        };
    }

    report.recommendations = rec;

    const reportSection = document.getElementById('reportSection');
    const reportContent = document.getElementById('reportContent');
    const goalStatusBadge = document.getElementById('goalStatusBadge');

    // Update status badge
    goalStatusBadge.textContent = report.goal_status.toUpperCase();
    goalStatusBadge.className = `status-badge ${report.goal_status.replace(' ', '-')}`;

    // Build HTML
    const html = `
        <div class="report-grid">
            <div class="report-card">
                <h3>📝 Summary</h3>
                <p>${report.summary}</p>
            </div>

            <div class="report-card">
                <h3>📊 Metrics Analysis</h3>
                <p><strong>Accuracy Rate:</strong> ${report.metrics_analysis.accuracy_rate}%</p>
                <p><strong>Activation Rate:</strong> ${report.metrics_analysis.activation_rate}%</p>
                <p><strong>Insight:</strong> ${report.metrics_analysis.insight}</p>
            </div>

            <div class="report-card">
                <h3>👤 Patient Factors</h3>
                <p><strong>Height:</strong> ${report.patient_factors.height} cm</p>
                <p><strong>Weight:</strong> ${report.patient_factors.weight} kg</p>
                <p><strong>BMI:</strong> ${report.patient_factors.bmi}</p>
                <p><strong>Fitness:</strong> ${report.patient_factors.fitness_experience}</p>
                <p><strong>Cause:</strong> ${report.patient_factors.cause}</p>
            </div>

            <div class="report-card">
                <h3>🎯 Adaptive Plan</h3>
                <p><span class="plan-type-badge ${report.adaptive_plan.type}">
                    ${report.adaptive_plan.type.toUpperCase()}
                </span></p>
                <p><strong>Action:</strong> ${report.adaptive_plan.action}</p>
            </div>
        </div>

        <div class="report-card" style="margin-top: 20px;">
            <h3>💡 Recommendations</h3>

            <ul>
                <li><strong>Immediate Actions:</strong>
                    <ul>
                        ${(report.recommendations.immediate_actions || [])
                            .map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </li>

                <li><strong>Short-Term Goals:</strong>
                    <ul>
                        ${(report.recommendations.short_term_goals || [])
                            .map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </li>

                <li><strong>Long-Term Goals:</strong>
                    <ul>
                        ${(report.recommendations.long_term_goals || [])
                            .map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </li>

                <li><strong>Lifestyle Modifications:</strong>
                    <ul>
                        ${(report.recommendations.lifestyle_modifications || [])
                            .map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </li>
            </ul>
        </div>
    `;

    reportContent.innerHTML = html;
    reportSection.classList.add('active');
    reportSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}


        /**
         * Initialize dashboard
         */
        function init() {
            initChart();
            connectWebSocket();
            
            // Setup form submission
            document.getElementById('sessionReportForm').addEventListener('submit', generateReport);
            
            // Show initial connection message
            showAlert('Initializing connection to patient monitoring system...', 'info');

            // Auto-populate IoT data every 5 seconds if available
            setInterval(populateIoTData, 5000);
            populateIoTData();
        }

        // Initialize on page load
        init();
    </script>
</body>
</html>
