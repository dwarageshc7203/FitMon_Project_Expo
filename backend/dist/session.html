<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Session | FitMon</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        .session-container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .action-card {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .action-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 150px;
            background: linear-gradient(180deg, rgba(0, 230, 118, 0.05) 0%, transparent 100%);
            z-index: 0;
            pointer-events: none;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: var(--green);
        }
        
        .icon-circle svg { width: 40px; height: 40px; stroke: currentColor; }

        .session-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .session-desc {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2.5rem;
        }

        .code-input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .code-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.25rem;
            font-family: 'Space Grotesk', monospace;
            font-size: 1.5rem;
            color: var(--green);
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .code-input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 4px rgba(0, 230, 118, 0.1);
        }

        .btn-action {
            width: 100%;
            background: var(--green);
            color: #000;
            border: none;
            padding: 1.25rem;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 230, 118, 0.2);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .generated-code-display {
            font-family: 'Space Grotesk', monospace;
            font-size: 3rem;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.2em;
            margin: 1rem 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>FITMON</span>
            </div>
            
            <div class="nav-menu">
                <a href="/home.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="/session.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polygon points="10 8 16 12 10 16 10 8"></polygon>
                    </svg>
                    <span>Live Session</span>
                </a>
                <!-- Role-based nav items will be controlled by JS -->
                <div id="nav-athlete-only">
                    <a href="/workouts.html" class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        <span>Library</span>
                    </a>
                </div>
                <a href="/profile.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Profile</span>
                </a>
            </div>

            <div class="user-profile">
                <!-- User info loaded by JS -->
                <div class="user-avatar" id="navAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="navName">Loading...</div>
                    <div class="user-role" id="navRole">...</div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumbs">
                    <span>Live Session</span>
                    <span class="separator">/</span>
                    <span class="current" id="sessionBreadcrumb">Lobby</span>
                </div>
                <div class="top-bar-actions">
                    <div class="status-indicator online">
                        <div class="status-dot"></div>
                        <span>System Online</span>
                    </div>
                </div>
            </header>

            <div class="session-container">
                
                <!-- ATHLETE VIEW -->
                <div id="view-athlete" class="action-card" style="display:none">
                    <div class="icon-circle">
                         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                        </svg>
                    </div>
                    <h1 class="session-title">Join Session</h1>
                    <p class="session-desc">Enter the 6-character code provided by your coach to begin.</p>
                    
                    <div class="code-input-group">
                        <input type="text" class="code-input" id="input-session-code" placeholder="CODE" maxlength="8">
                    </div>
                    
                    <button class="btn-action" onclick="joinSession()">
                        Join Session
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                    <div id="joinError" style="color:#ff4444; margin-top:1rem; display:none;"></div>
                </div>

                <!-- COACH VIEW -->
                <div id="view-coach" class="action-card" style="display:none">
                    <div class="icon-circle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <h1 class="session-title">Host Session</h1>
                    <p class="session-desc">Generate a secure code to invite your athlete.</p>

                    <div id="coach-step-1">
                        <button class="btn-action" onclick="generateSession()">
                            Generate New Code
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                            </svg>
                        </button>
                    </div>

                    <div id="coach-step-2" style="display:none">
                        <div class="generated-code-display" id="generated-code">------</div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <button class="btn-action btn-secondary" onclick="copyCode()">Copy Code</button>
                            <button class="btn-action" onclick="launchDashboard()">
                                Launch Dashboard
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Init
        document.addEventListener('DOMContentLoaded', () => {
             const userStr = localStorage.getItem('fitmonCurrentUser');
             if (!userStr) {
                 window.location.href = '/login.html';
                 return;
             }
             const user = JSON.parse(userStr);

             // Nav Info
             document.getElementById('navName').textContent = user.username;
             document.getElementById('navAvatar').textContent = user.username.charAt(0).toUpperCase();
             
             // Role Logic
             const role = (user.role || 'athlete').toLowerCase();
             
             // Nav Visibility
             if (role === 'doctor' || role === 'coach') {
                 document.getElementById('navRole').textContent = 'Coach';
                 const athleteNav = document.getElementById('nav-athlete-only');
                 if (athleteNav) athleteNav.style.display = 'none'; // Hide Library for coaches
                 
                 // Show Coach View
                 document.getElementById('view-coach').style.display = 'block';
                 document.getElementById('sessionBreadcrumb').textContent = 'Host Console';
             } else {
                 document.getElementById('navRole').textContent = 'Athlete';
                 const athleteNav = document.getElementById('nav-athlete-only');
                 if (athleteNav) athleteNav.style.display = 'block';
                 
                 // Show Athlete View
                 document.getElementById('view-athlete').style.display = 'block';
                 document.getElementById('sessionBreadcrumb').textContent = 'Join Lobby';
             }
        });

        // Coach Logic
        function generateSession() {
            // In a real app, call API. For now, random code.
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('generated-code').textContent = code;
            sessionStorage.setItem('sessionCode', code);
            
            document.getElementById('coach-step-1').style.display = 'none';
            document.getElementById('coach-step-2').style.display = 'block';
        }

        function copyCode() {
            const code = document.getElementById('generated-code').textContent;
            navigator.clipboard.writeText(code);
            alert('Code copied to clipboard: ' + code);
        }

        function launchDashboard() {
            window.location.href = '/doctor.html';
        }

        // Athlete Logic
        function joinSession() {
            const code = document.getElementById('input-session-code').value.trim();
            if (code.length < 3) {
                document.getElementById('joinError').textContent = 'Invalid Code';
                document.getElementById('joinError').style.display = 'block';
                return;
            }
            sessionStorage.setItem('sessionCode', code);
            window.location.href = '/patient.html';
        }
    </script>
</body>
</html>
